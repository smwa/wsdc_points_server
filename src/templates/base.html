<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}WSDC Points{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="WSDC Points lets you look up West Coast Swing competition points for dancers and browse past and upcoming WSDC-sanctioned events.">
  <meta name="theme-color" content="#062C06">
  <link rel="icon" type="image/png" href="/static/icons/favicon.png">
  <link rel="apple-touch-icon" href="/static/icons/favicon.png">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="stylesheet" href="/static/css/index.css">
  {% block head %}{% endblock %}
</head>
{% set p = request.url.path %}
<body class="{% block body_class %}{% endblock %}">
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-brand" href="/">
        <img class="nav-logo" src="/static/icons/favicon.png" alt="">
        WSDC Points
      </a>
      <ul class="nav-links">
        <li><a href="/dancers" class="{{ 'active' if p == '/dancers' or p.startswith('/dancer/') }}">Dancers</a></li>
        <li><a href="/events" class="{{ 'active' if p == '/events' or p.startswith('/event/') or p.startswith('/event-competitors') }}">Events</a></li>
        <li><a href="/upcoming-events" class="{{ 'active' if p == '/upcoming-events' }}">Upcoming Events</a></li>
        <li><a href="/dancers-over-time" class="{{ 'active' if p == '/dancers-over-time' }}">Dancers Over Time</a></li>
        <li><a href="/about" class="{{ 'active' if p == '/about' }}">About</a></li>
      </ul>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
